<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>📋 需求任务公告板</title>
    <link rel="stylesheet" href="/task-board/css/dashboard.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .header h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .column {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .column-header {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .task-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .task-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        
        .task-meta {
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: space-between;
        }
        
        .priority {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }
        
        .priority-P0 { background: #ff4757; color: white; }
        .priority-P1 { background: #ffa502; color: white; }
        .priority-P2 { background: #2ed573; color: white; }
        .priority-P3 { background: #1e90ff; color: white; }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }
        
        .blocked-alert {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 3px solid #ff4757;
        }
        .blocked-alert h3 {
            color: #ff4757;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .blocked-item {
            background: #fff5f5;
            border-left: 4px solid #ff4757;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }
        .blocked-item a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        .blocked-item a:hover {
            text-decoration: underline;
        }
        .blocked-reason {
            color: #ff4757;
            font-size: 13px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Agent 状态仪表板 -->
        <div class="agent-dashboard">
            <h2>📊 团队状态</h2>
            <div class="agent-cards">
                <!-- Agent 卡片由 JS 动态生成 -->
            </div>
            <div id="last-updated" class="last-updated">
                <span>最后更新：--</span>
                <button class="refresh-btn" onclick="refreshData()" title="点击刷新数据，或刷新浏览器页面">🔄 刷新</button>
            </div>
        </div>
        
        <!-- 延期任务告警 -->
        <div class="overdue-alerts" style="display: none;">
            <h3>⚠️ 延期任务</h3>
        </div>
        
        <div class="header">
            <h1>📋 需求任务公告板</h1>
            <p>任务管理系统 v1.0</p>
            
            <div class="stats" id="stats">
                <div class="stat-card">
                    <div class="stat-number" id="total-tasks">-</div>
                    <a href="#board" style="color: white; text-decoration: none;">
                        <div class="stat-label">📋 全部任务</div>
                    </a>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);">
                    <a href="/task-board/blocked.html?v=202603140920" style="color: white; text-decoration: none;">
                        <div class="stat-number" id="blocked-tasks">-</div>
                        <div class="stat-label">🔴 阻塞中</div>
                    </a>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="progress-tasks">-</div>
                    <a href="/task-board/progress.html?v=202603140920" style="color: white; text-decoration: none;">
                        <div class="stat-label">🟡 进行中</div>
                    </a>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="pending-tasks">-</div>
                    <a href="/task-board/pending.html?v=202603140920" style="color: white; text-decoration: none;">
                        <div class="stat-label">⏸️ 等待中</div>
                    </a>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #ffa502 0%, #ff7f50 100%);">
                    <a href="/task-board/reviewing.html?v=202603140920" style="color: white; text-decoration: none;">
                        <div class="stat-number" id="reviewing-tasks">-</div>
                        <div class="stat-label">📝 审批中</div>
                    </a>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="completed-tasks">-</div>
                    <a href="/task-board/completed.html?v=202603140920" style="color: white; text-decoration: none;">
                        <div class="stat-label">✅ 已完成</div>
                    </a>
                </div>
            </div>
        </div>
        
        <div id="loading" class="loading">
            加载中...
        </div>
        
        <!-- 阻塞任务告警 -->
        <div class="blocked-alert" id="blocked-alert" style="display: none;">
            <h3>🚨 阻塞任务</h3>
            <div id="blocked-tasks-list"></div>
        </div>
        
        <div class="board" id="board" style="display: none;">
            <div class="column">
                <div class="column-header">🟡 进行中</div>
                <div id="progress-column"></div>
            </div>
            
            <div class="column">
                <div class="column-header">⏸️ 等待中</div>
                <div id="pending-column"></div>
            </div>
            
            <div class="column">
                <div class="column-header">✅ 已完成</div>
                <div id="completed-column"></div>
            </div>
        </div>
    </div>
    
    <script src="/task-board/js/update-stats.js?v=202603140925"></script>
    <script src="/task-board/js/task-lists.js?v=202603140900"></script>
    <script src="/task-board/js/dashboard.js?v=202603140925"></script>
</body>
</html>
