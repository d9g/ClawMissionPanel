<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 小云任务公告板</title>
    <link rel="stylesheet" href="/task-board/css/dashboard.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .header h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .column {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .column-header {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .task-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .task-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        
        .task-meta {
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: space-between;
        }
        
        .priority {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }
        
        .priority-P0 { background: #ff4757; color: white; }
        .priority-P1 { background: #ffa502; color: white; }
        .priority-P2 { background: #2ed573; color: white; }
        .priority-P3 { background: #1e90ff; color: white; }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Agent 状态仪表板 -->
        <div class="agent-dashboard">
            <h2>📊 团队状态</h2>
            <div class="agent-cards">
                <div class="agent-card">
                    <div class="agent-header">
                        <span class="agent-name">加载中...</span>
                    </div>
                </div>
            </div>
            <div id="last-updated" class="last-updated">
                <span>最后更新：--</span>
                <button class="refresh-btn" onclick="refreshData()" title="点击刷新数据，或刷新浏览器页面">🔄 刷新</button>
            </div>
        </div>
        
        <!-- 延期任务告警 -->
        <div class="overdue-alerts" style="display: none;">
            <h3>⚠️ 延期任务</h3>
        </div>
        
        <!-- 任务统计 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value">-</div>
                <div class="stat-label">加载中</div>
            </div>
        </div>
        
        <div class="header">
            <h1>📋 小云任务公告板</h1>
            <p>任务管理系统 v1.0</p>
            
            <div class="stats" id="stats">
                <div class="stat-card">
                    <div class="stat-number" id="total-tasks">-</div>
                    <div class="stat-label">总任务</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="draft-tasks">-</div>
                    <div class="stat-label">待拆解</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="pending-tasks">-</div>
                    <div class="stat-label">待审批</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="progress-tasks">-</div>
                    <div class="stat-label">进行中</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="completed-tasks">-</div>
                    <div class="stat-label">已完成</div>
                </div>
            </div>
        </div>
        
        <div id="loading" class="loading">
            加载中...
        </div>
        
        <div class="board" id="board" style="display: none;">
            <div class="column">
                <div class="column-header">📝 待拆解</div>
                <div id="draft-column"></div>
            </div>
            
            <div class="column">
                <div class="column-header">🔴 待审批</div>
                <div id="pending-column"></div>
            </div>
            
            <div class="column">
                <div class="column-header">🟡 进行中</div>
                <div id="progress-column"></div>
            </div>
            
            <div class="column">
                <div class="column-header">🟢 待验收</div>
                <div id="review-column"></div>
            </div>
            
            <div class="column">
                <div class="column-header">✅ 已完成</div>
                <div id="completed-column"></div>
            </div>
        </div>
    </div>
    
    <script src="/task-board/js/dashboard.js?v=202603122236"></script>
</body>
</html>
